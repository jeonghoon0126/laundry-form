name: 캐리 동선 문자 발송

on:
  schedule:
    # 매일 오전 9시 KST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN (실제 발송 없이 메시지 확인만)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  send-sms:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-route.txt

      - name: 의존성 설치
        run: pip install -r requirements-route.txt

      - name: 동선 문자 발송
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          SOLAPI_SENDER: ${{ secrets.SOLAPI_SENDER }}
          RECIPIENT_PHONE: ${{ secrets.RECIPIENT_PHONE }}
          OWNER_PHONE: ${{ secrets.OWNER_PHONE }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python scripts/send_route_sms.py
