name: 캐리 동선 문자 발송
run-name: 캐리 동선 문자 발송 ${{ github.event.inputs.target_date || 'today' }} ${{ github.event.inputs.dry_run == 'true' && 'dry-run' || 'send' }}

on:
  schedule:
    # 월·목 KST. 10:00 1차, 10:30/11:00/11:30 백업.
    # GitHub hosted runner 배정 실패/지연 시 다음 슬롯이 재시도하고,
    # 아래 dedupe + concurrency 로 같은 날 중복 발송을 막는다.
    - cron: "0 1 * * 1,4"
    - cron: "30 1 * * 1,4"
    - cron: "0 2 * * 1,4"
    - cron: "30 2 * * 1,4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN (실제 발송 없이 메시지 확인만)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      target_date:
        description: "재발송 대상 날짜 (YYYY-MM-DD, 비우면 오늘)"
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: carry-route-sms-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-sms:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-route.txt

      - name: 의존성 설치
        run: pip install -r requirements-route.txt

      - name: 같은 날 중복 발송 확인
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
        run: python scripts/dispatch_route_sms.py --check-only

      - name: 동선 문자 발송
        if: steps.dedupe.outputs.should_send == 'true'
        env:
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          SOLAPI_SENDER: ${{ secrets.SOLAPI_SENDER }}
          RECIPIENT_PHONE: ${{ secrets.RECIPIENT_PHONE }}
          OWNER_PHONE: ${{ secrets.OWNER_PHONE }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          TEST_DATE: ${{ github.event.inputs.target_date || '' }}
        run: python scripts/send_route_sms.py

      - name: 중복 발송으로 건너뜀
        if: steps.dedupe.outputs.should_send != 'true'
        run: echo "이미 오늘 성공 발송이 있어 건너뜁니다. run=${{ steps.dedupe.outputs.existing_run_id }}"
